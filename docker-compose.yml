networks:
  reporting-network:
    driver: bridge

volumes:
  postgres-data:
  postgres-secondary-data:
  zookeeper-data:
  config-server-git-cache:
  rabbitmq_data:

services:
  postgres:
    image: postgres:15-alpine
    container_name: phd-postgres
    environment:
      POSTGRES_DB: ${POSTGRES_DB:-jira_db}
      POSTGRES_USER: ${POSTGRES_USER:-jira}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
    ports:
      - "5432:5432"
    networks:
      - reporting-network
    volumes:
      - postgres-data:/var/lib/postgresql/data
      - ./init-db.sql:/docker-entrypoint-initdb.d/
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U postgres" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  postgres-secondary:
    image: postgres:15-alpine
    container_name: phd-postgres-secondary
    environment:
      POSTGRES_DB: ${SECOND_POSTGRES_DB:-reporting_db}
      POSTGRES_USER: ${SECOND_POSTGRES_USER:-reporting}
      POSTGRES_PASSWORD: ${SECOND_POSTGRES_PASSWORD:-password}
    ports:
      - "5433:5432"
    networks:
      - reporting-network
    volumes:
      - postgres-secondary-data:/var/lib/postgresql/data
    healthcheck:
      test: [ "CMD-SHELL", "pg_isready -U reporting" ]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 60s
    restart: unless-stopped

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: phd-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
      ALLOW_ANONYMOUS_LOGIN: "yes"
    ports:
      - "2181:2181"
    volumes:
      - zookeeper-data:/var/lib/zookeeper/data
    networks:
      - reporting-network
    healthcheck:
      test: ["CMD-SHELL", "nc -z localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: always

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: phd-kafka
    depends_on:
      zookeeper:
        condition: service_healthy
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    ports:
      - "9092:9092"
    networks:
      - reporting-network
    healthcheck:
      test: [ "CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092" ]
      interval: 10s
      timeout: 10s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    platform: linux/arm64/v8
    container_name: phd-redis
    ports:
      - "${REDIS_PORT:-6379}:6379"
    networks:
      - reporting-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management
    platform: linux/arm64/v8
    container_name: phd-rabbitmq
    restart: unless-stopped
    hostname: rabbitmq
    ports:
      - "${RABBITMQ_PORT:-5672}:5672"
      - "${RABBITMQ_MANAGEMENT_PORT:-15672}:15672"
    environment:
      - RABBITMQ_ERLANG_COOKIE=unechainealphanumeriquedau moinsvingtcaracteres
      - RABBITMQ_DEFAULT_USER=${RABBITMQ_DEFAULT_USER:-guest}
      - RABBITMQ_DEFAULT_PASS=${RABBITMQ_DEFAULT_PASS:-guest}
      - RABBITMQ_NODENAME=rabbit@rabbitmq
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    networks:
      - reporting-network
    healthcheck:
      test: ["CMD", "rabbitmqctl", "status"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 30s

  config-server:
    build:
      context: ./config-server
      dockerfile: Dockerfile
    container_name: config-server
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_APPLICATION_NAME: config-server
      SERVER_PORT: 8888
      SPRING_CLOUD_CONFIG_SERVER_GIT_URI: https://github.com/youceyf11/Reporting-Config-Repo.git
      SPRING_CLOUD_CONFIG_SERVER_GIT_DEFAULT_LABEL: main
      SPRING_CLOUD_CONFIG_SERVER_GIT_SEARCH_PATHS: config-repo
      SPRING_CLOUD_CONFIG_SERVER_GIT_CLONE_ON_START: true
      SPRING_CLOUD_CONFIG_SERVER_GIT_FORCE_PULL: true
      SPRING_CLOUD_CONFIG_SERVER_GIT_BASEDIR: /config-repo-cache
      SPRING_CLOUD_CONFIG_SERVER_GIT_REFRESH_RATE: 0
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_CLOUD_CONFIG: DEBUG
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_CLOUD_CONFIG_SERVER_ENVIRONMENT: DEBUG
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK_CLOUD_CONFIG_SERVER_GIT: DEBUG
      LOGGING_LEVEL_ORG_ECLIPSE_JGIT: INFO
      SPRING_CLOUD_CONFIG_SERVER_GIT_TIMEOUT: 30
      SPRING_CLOUD_CONFIG_SERVER_GIT_CLONE_TIMEOUT: 60
      SPRING_CLOUD_CONFIG_SERVER_GIT_PULL_TIMEOUT: 30
      SERVER_TOMCAT_CONNECTION_TIMEOUT: 60000
      SERVER_TOMCAT_THREADS_MAX: 200
    ports:
      - "8888:8888"
    networks:
      - reporting-network
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8888/actuator/health || exit 1" ]
      interval: 10s
      timeout: 10s
      retries: 15
      start_period: 120s
    restart: unless-stopped
    volumes:
      - config-server-git-cache:/config-repo-cache

  eureka-server:
    build:
      context: ./eureka-server
      dockerfile: Dockerfile
    container_name: eureka-server
    hostname: eureka-server
    environment:
      SPRING_PROFILES_ACTIVE: docker
      SPRING_APPLICATION_NAME: eureka-server
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
      EUREKA_INSTANCE_HOSTNAME: eureka-server
      LOGGING_LEVEL_ROOT: INFO
      LOGGING_LEVEL_ORG_SPRINGFRAMEWORK: INFO
      SPRING_OUTPUT_ANSI_ENABLED: ALWAYS
    ports:
      - "8761:8761"
    networks:
      - reporting-network
    depends_on:
      config-server:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8761/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  api-gateway:
    build:
      context: ./api-gateway
      dockerfile: Dockerfile
    container_name: api-gateway
    hostname: api-gateway
    environment:
      SPRING_PROFILES_ACTIVE: docker
      EUREKA_INSTANCE_PREFER_IP_ADDRESS: "true"
      EUREKA_INSTANCE_HOSTNAME: api-gateway
      EUREKA_CLIENT_SERVICEURL_DEFAULTZONE: http://eureka-server:8761/eureka/
      SPRING_CONFIG_IMPORT: configserver:http://config-server:8888
    ports:
      - "8080:8080"
    networks:
      - reporting-network
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: [ "CMD-SHELL", "curl -f http://localhost:8080/actuator/health || exit 1" ]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 60s
    restart: unless-stopped

  jira-fetch-service:
    build:
      context: ./jira-fetch-service
      dockerfile: Dockerfile
    container_name: jira-fetch-service
    hostname: jira-fetch-service
    ports:
      - "${JIRA_FETCH_SERVICE_PORT:-8081}:8081"
    env_file: .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CONFIG_IMPORT=configserver:http://config-server:8888
      - JIRA_BASE_URL=https://youceyfouriniche.atlassian.net
      - JIRA_USERNAME=Youssef.Ouriniche@emsi-edu.ma
      - JIRA_API_TOKEN=ATATT3xFfGF0qiFqF1w2laI2SAjACCezBZDsars1tLsDyI6Jg4SibhP1XYXdSvZuxcWKL_h__fzQbDOufz-OU7oRvuYcdCeIgmzJINfPI_kIx74qnfgZxUHjl_6FZsePbgAZyRkCvo531zl1gMuFnGFO33T7qv6rwSJqH51CEBv-lXK6YVsVmaM=975D5546
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres:5432/jira_db
      - SPRING_DATASOURCE_USERNAME=jira
      - SPRING_DATASOURCE_PASSWORD=postgres
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - EUREKA_INSTANCE_HOSTNAME=jira-fetch-service
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=true
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
    networks:
      - reporting-network
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      postgres:
        condition: service_healthy
      kafka:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8081/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    restart: unless-stopped

  reporting-service:
    build:
      context: ./reporting-service
      dockerfile: Dockerfile
    container_name: reporting-service
    ports:
      - "${REPORTING_SERVICE_PORT:-8082}:8082"
    env_file: .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CONFIG_IMPORT=configserver:http://config-server:8888
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-secondary:5432/reporting_db
      - SPRING_DATASOURCE_USERNAME=${SECOND_POSTGRES_USER}
      - SPRING_DATASOURCE_PASSWORD=${SECOND_POSTGRES_PASSWORD}
      - SPRING_KAFKA_BOOTSTRAP_SERVERS=kafka:29092
      - EUREKA_INSTANCE_HOSTNAME=reporting-service
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=false
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_CLIENT_ENABLED=true
      - SPRING_CLOUD_DISCOVERY_ENABLED=true
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
      - SPRING_JPA_SHOW_SQL=true
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    networks:
      - reporting-network
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      jira-fetch-service:
        condition: service_healthy
      kafka:
        condition: service_healthy
      postgres-secondary:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 15
      start_period: 90s
    restart: unless-stopped

  chart-service:
    build:
      context: ./chart-service
      dockerfile: Dockerfile
    container_name: chart-service
    ports:
      - "${CHART_SERVICE_PORT:-8083}:8083"
    env_file: .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CONFIG_IMPORT=configserver:http://config-server:8888
      - REPORTING_SERVICE_URL=http://reporting-service:8082
      - EUREKA_INSTANCE_HOSTNAME=chart-service
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=false
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_CLIENT_ENABLED=true
      - SPRING_CLOUD_DISCOVERY_ENABLED=true
    networks:
      - reporting-network
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
      reporting-service:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    restart: unless-stopped

  excel-service:
    build:
      context: ./excel-service
      dockerfile: Dockerfile
    container_name: excel-service
    ports:
      - "${EXCEL_SERVICE_PORT:-8085}:8085"
    env_file: .env
    environment:
      - SPRING_PROFILES_ACTIVE=docker
      - SPRING_CONFIG_IMPORT=configserver:http://config-server:8888
      - JIRA_SERVICE_URL=http://jira-fetch-service:8081
      - REPORTING_SERVICE_URL=http://reporting-service:8082
      - EUREKA_INSTANCE_HOSTNAME=excel-service
      - EUREKA_INSTANCE_PREFER_IP_ADDRESS=false
      - EUREKA_CLIENT_SERVICEURL_DEFAULTZONE=http://eureka-server:8761/eureka/
      - EUREKA_CLIENT_ENABLED=true
      - SPRING_CLOUD_DISCOVERY_ENABLED=true
    networks:
      - reporting-network
    depends_on:
      config-server:
        condition: service_healthy
      eureka-server:
        condition: service_healthy
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8085/actuator/health"]
      interval: 15s
      timeout: 5s
      retries: 10
      start_period: 90s
    restart: unless-stopped

